<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SISTEMAS</title>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    :root {
      --lime: #d7ff00;
      --lime-strong: #a6d900;
      --pink: #ff4fa3;
      --green: #22a447;
      --blue: #1266d6;
      --violet: #7c3aed;
      --red: #d92d20;
      --ink: #10140d;
      --muted: #5b6252;
      --paper: #fbfff0;
      --panel: #f6ffc7;
      --line: #cfff2e;
      --white: #ffffff;
      --shadow: 0 18px 45px rgba(70, 110, 0, .16);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(215, 255, 0, .48), transparent 34rem),
        linear-gradient(135deg, #fbffe9 0%, #ffffff 48%, #efffbf 100%);
    }

    button, input, textarea { font: inherit; }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 44px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-title-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--lime);
      box-shadow: var(--shadow);
      font-weight: 700;
    }

    h1, h2, h3, p { margin-top: 0; }

    h1 {
      margin-bottom: 4px;
      font-size: clamp(1.65rem, 3vw, 2.4rem);
      letter-spacing: 0;
    }

    h2 { margin-bottom: 12px; }

    .subhead {
      margin: 0;
      color: var(--muted);
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .panel {
      background: rgba(251, 255, 240, .94);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 18px;
    }

    .toolbar, .button-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .toolbar {
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .btn {
      border: 1px solid var(--lime-strong);
      border-radius: 8px;
      padding: 10px 14px;
      min-height: 42px;
      background: var(--white);
      color: var(--ink);
      cursor: pointer;
      font-weight: 700;
    }

    .btn:hover { filter: brightness(.98); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn.lime { background: var(--lime); }
    .btn.pink { background: var(--pink); border-color: #d93686; color: #fff; }
    .btn.green { background: var(--green); border-color: #15803d; color: #fff; }
    .btn.blue { background: var(--blue); border-color: #0b56b4; color: #fff; }
    .btn.violet { background: var(--violet); border-color: #5b21b6; color: #fff; }
    .btn.red { background: var(--red); border-color: #b42318; color: #fff; }

    .report-number {
      font-size: 1.08rem;
      background: var(--lime);
      border: 1px solid var(--lime-strong);
      border-radius: 8px;
      padding: 12px 16px;
      font-weight: 700;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-weight: 700;
    }

    input[type="text"], textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      color: var(--ink);
      padding: 11px 12px;
    }

    textarea {
      min-height: 112px;
      resize: vertical;
    }

    .field { margin-bottom: 16px; }

    .systems {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .systems .btn {
      min-height: 70px;
      white-space: normal;
    }

    .prepared-list {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }

    .prepared-item {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .76);
      padding: 10px 12px;
    }

    .prepared-item strong {
      display: block;
    }

    .short-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .saved-list {
      display: grid;
      gap: 10px;
    }

    .saved-item {
      display: grid;
      grid-template-columns: minmax(120px, .35fr) minmax(180px, 1fr) auto;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 12px;
    }

    .saved-title {
      font-weight: 700;
    }

    .saved-meta {
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .section-block {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .7);
      padding: 14px;
      margin-bottom: 14px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .section-title {
      font-weight: 700;
      font-size: 1.08rem;
    }

    .two-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .photos {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }

    .photo-slot {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      padding: 10px;
      min-width: 0;
    }

    .photo-preview {
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: 6px;
      border: 1px dashed var(--line);
      background: var(--panel);
      display: grid;
      place-items: center;
      color: var(--muted);
      overflow: hidden;
      margin-bottom: 8px;
      font-size: .9rem;
      text-align: center;
    }

    .photo-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photo-slot input { width: 100%; margin-bottom: 8px; }
    .photo-slot .btn { width: 100%; }

    .preview-shell {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 24px;
      overflow: auto;
      max-height: 70vh;
    }

    .doc {
      font-family: Arial, Helvetica, sans-serif;
      color: #111;
      line-height: 1.45;
    }

    .doc .doc-main-title {
      text-align: center;
      text-transform: uppercase;
      font-size: 14pt;
      font-weight: 700;
      margin: 0 0 18px;
    }

    .doc .doc-system-title {
      text-align: center;
      font-size: 13pt;
      font-weight: 700;
      margin: 0 0 16px;
    }

    .doc .doc-revision-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 0 0 12px;
      font-size: 11pt;
    }

    .doc .summary-table {
      width: 100%;
      border-collapse: collapse;
      margin: 0 0 18px;
      font-size: 11pt;
    }

    .doc .summary-table th,
    .doc .summary-table td {
      border: 1px solid #222;
      padding: 4px 6px;
      vertical-align: middle;
    }

    .doc .summary-client {
      background: #d4c4f0;
      text-align: left;
      font-weight: 700;
    }

    .doc .summary-head {
      background: #ae93e4;
      text-align: center;
      font-weight: 700;
    }

    .doc .summary-table td {
      background: #e5dcf5;
    }

    .doc h3 {
      font-size: 11.5pt;
      margin: 14px 0 6px;
    }

    .doc p { margin: 0 0 8px; }

    .doc .photo-title {
      text-align: center;
      text-transform: uppercase;
      font-size: 14pt;
      font-weight: 700;
      margin: 22px 0 14px;
    }

    .doc .photo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .doc .photo-grid img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border: 1px solid #ddd;
    }

    .empty {
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 14px;
      background: rgba(255, 255, 255, .62);
    }

    .status {
      min-height: 24px;
      color: var(--muted);
      font-weight: 700;
      margin-top: 10px;
    }

    .status.error { color: var(--red); }

    @media (max-width: 980px) {
      .systems, .photos { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .saved-item { grid-template-columns: 1fr; }
      .two-fields, .short-fields, .meta-grid { grid-template-columns: 1fr; }
      .prepared-item { grid-template-columns: 1fr; }
      .toolbar { align-items: flex-start; flex-direction: column; }
    }

    @media (max-width: 560px) {
      .systems, .photos { grid-template-columns: 1fr; }
      .button-row .btn { flex: 1 1 180px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">SI</div>
        <div>
          <div class="brand-title-row">
            <h1>SISTEMAS</h1>
            <button id="clearAppDataBtn" class="btn red" type="button">Limpiar datos</button>
          </div>
          <p class="subhead">Creación y archivo de informes técnicos por sistema.</p>
        </div>
      </div>
    </div>

    <section id="homeScreen" class="screen active" aria-labelledby="homeTitle">
      <div class="panel">
        <div class="toolbar">
          <div class="button-row">
            <div id="currentReportNumber" class="report-number">Informe 1</div>
            <button id="saveCurrentBtn" class="btn pink" type="button">Grabar</button>
            <button id="viewAllBtn" class="btn violet" type="button">Ver conjunto</button>
          </div>
          <div class="button-row">
            <button id="downloadAllPdfBtn" class="btn green" type="button">Descargar todo en PDF</button>
            <button id="downloadAllWordBtn" class="btn blue" type="button">Descargar todo en Word</button>
            <button id="deleteCurrentBtn" class="btn red" type="button">Borrar informe actual</button>
          </div>
        </div>

        <div class="field">
          <label for="reportHeader">Cabecera del informe</label>
          <input id="reportHeader" type="text" placeholder="Ejemplo: BAE 06 - RESIDENCIA INFANTE DON JUAN">
        </div>

        <div class="short-fields">
          <div class="field">
            <label for="revisionNumber">Nº revisión</label>
            <input id="revisionNumber" type="text" value="1 RT-2026">
          </div>
          <div class="field">
            <label for="revisionText">Revisión</label>
            <input id="revisionText" type="text" value="TRIMESTRAL">
          </div>
        </div>

        <h2 id="homeTitle">Sistemas</h2>
        <div id="systemButtons" class="systems"></div>
        <div id="preparedEntries" class="prepared-list"></div>
        <div id="homeStatus" class="status" aria-live="polite"></div>
      </div>

      <div class="panel">
        <h2>Informes grabados</h2>
        <div id="savedReports" class="saved-list"></div>
      </div>
    </section>

    <section id="systemScreen" class="screen" aria-labelledby="systemTitle">
      <div class="panel">
        <div class="toolbar">
          <div>
            <h2 id="systemTitle"></h2>
            <p id="systemSubtitle" class="subhead"></p>
          </div>
          <button id="backFromSystemBtn" class="btn" type="button">Volver</button>
        </div>

        <h2>Datos del cuadro resumen</h2>
        <div class="meta-grid">
          <div class="field">
            <label for="metaClient">Cliente</label>
            <input id="metaClient" type="text" placeholder="Cliente">
          </div>
          <div class="field">
            <label for="metaBuilding">Edificio</label>
            <input id="metaBuilding" type="text" placeholder="Edificio">
          </div>
          <div class="field">
            <label for="metaSystem">Sistema</label>
            <input id="metaSystem" type="text" placeholder="Sistema">
          </div>
          <div class="field">
            <label for="metaDenomination">Denominación</label>
            <input id="metaDenomination" type="text" placeholder="Denominación">
          </div>
        </div>

        <div id="sectionContainer"></div>

        <h2>Imágenes</h2>
        <div id="photoContainer" class="photos"></div>

        <div class="button-row" style="margin-top: 18px;">
          <button id="saveEntryBtn" class="btn green" type="button">Grabar</button>
          <button id="viewEntryBtn" class="btn violet" type="button">Ver</button>
        </div>
        <div id="systemStatus" class="status" aria-live="polite"></div>
      </div>
    </section>

    <section id="previewScreen" class="screen" aria-labelledby="previewTitle">
      <div class="panel">
        <div class="toolbar">
          <div>
            <h2 id="previewTitle">Vista previa</h2>
            <p id="previewSubtitle" class="subhead"></p>
          </div>
          <div class="button-row">
            <button id="backFromPreviewBtn" class="btn" type="button">Volver</button>
            <button id="saveMountedBtn" class="btn pink" type="button">Grabar</button>
            <button id="downloadMountedPdfBtn" class="btn green" type="button">Descargar informe en PDF</button>
            <button id="downloadMountedWordBtn" class="btn blue" type="button">Descargar en Word</button>
            <button id="clearMountedBtn" class="btn red" type="button">Borrar y empezar de nuevo</button>
          </div>
        </div>
        <div class="preview-shell">
          <article id="mountedPreview" class="doc"></article>
        </div>
        <div id="previewStatus" class="status" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <script>
    const SYSTEMS = [
      "Central de Detección de Incendios",
      "Central de Extinción de Incendios",
      "Extinción de Incendios",
      "Grupo de Presión Contra Incendios",
      "Redes Contra Incendios"
    ];

    const SECTIONS = [
      "1. Antecedentes",
      "2. Comprobaciones realizadas",
      "3. Estado",
      "4. Normativa relacionada",
      "5. Conclusión"
    ];

    const STORAGE_KEY = "sistemas.informes.v2";
    const DB_NAME = "sistemas-informes-db";
    const DB_STORE = "state";

    const DEFAULT_FIXED_TEXTS = {
      [SYSTEMS[0]]: {
        [SECTIONS[0]]: `Durante la visita de mantenimiento/inspección se comprueba la central principal de detección de incendios instalada en la dependencia indicada. El informe recoge exclusivamente el estado observado en el momento de la revisión, identificando la información visible en pantalla, pilotos, alimentación, baterías, zonas/lazos y elementos asociados cuando sea posible. Cuando no exista listado de zonas o documentación disponible, se dejará constancia expresa de que no se puede determinar la correspondencia exacta entre zona/lazo y ubicación protegida.`,
        [SECTIONS[1]]: `Se realiza comprobación visual y funcional de la central, revisando el estado general del equipo, señalización luminosa, indicaciones de pantalla, estado de avería/alarma/desconexión/prueba, alimentación, baterías y, cuando procede, comunicación con zonas, lazos, sirenas, pulsadores, detectores o módulos. Se verifican las incidencias que aparecen registradas por la propia central sin modificar la configuración ni alterar la instalación fuera del alcance de mantenimiento indicado.`,
        [SECTIONS[2]]: `La central queda descrita conforme al estado observado.`,
        [SECTIONS[3]]: `A efectos de encuadre técnico, el sistema se analiza dentro del Reglamento de Instalaciones de Protección Contra Incendios, Real Decreto 513/2017, y de la familia UNE 23007 aplicable a sistemas de detección y alarma de incendios, especialmente en lo relativo a planificación, instalación, puesta en servicio, uso y mantenimiento. En edificios no industriales puede resultar aplicable el CTE DB-SI; en establecimientos industriales, el RSCIEI vigente.

Real Decreto 513/2017, RIPCI: Reglamento principal aplicable a las instalaciones de protección contra incendios, incluyendo los sistemas de detección y alarma de incendios.
Anexo II del RIPCI: Define las operaciones mínimas de mantenimiento de los sistemas de detección y alarma de incendios.
Sistemas de detección y alarma de incendios: Incluidos dentro del RIPCI como sistemas de protección activa contra incendios.
UNE 23007: Familia normativa de referencia para sistemas de detección y alarma de incendios.
UNE 23007-14: Norma de referencia para planificación, diseño, instalación, puesta en servicio, uso y mantenimiento de sistemas de detección y alarma de incendios.
Central de detección: Equipo de control e indicación del sistema, encargado de recibir señales de detectores, pulsadores y módulos, así como de gestionar alarmas, averías y anulaciones.
Detectores, pulsadores y módulos: Elementos de campo asociados al sistema de detección, supervisados desde la central según la configuración de la instalación.
Real Decreto 314/2006, CTE: Aplicable cuando el sistema pertenece a edificios sujetos al Código Técnico de la Edificación.
CTE DB-SI: Documento Básico de Seguridad en caso de Incendio. Define exigencias de protección contra incendios en edificios.
Real Decreto 164/2025, RSCIEI: Aplicable cuando el sistema de detección protege un establecimiento industrial.`,
        [SECTIONS[4]]: `La central de detección ha sido comprobada durante la intervención, verificándose su estado de servicio y las indicaciones presentes en el equipo en el momento de la revisión. Durante la comprobación se ha observado el estado general de la central, pilotos de señalización, pantalla, avisos de avería, alarmas, anulaciones, alimentación, baterías y demás elementos accesibles vinculados al sistema de detección y alarma de incendios.

Las incidencias reflejadas corresponden a las señales y estados indicados por la central en la fecha de revisión, así como a las observaciones realizadas sobre los elementos visibles y comprobables del sistema. El presente informe recoge el estado técnico apreciado durante el mantenimiento, dejando constancia de las condiciones de funcionamiento observadas, sin incluir valoraciones sobre actuaciones posteriores no realizadas en el momento de la inspección.`
      },
      [SYSTEMS[1]]: {
        [SECTIONS[0]]: `Durante la revisión se comprueba la central de extinción asociada al sistema automático/manual de extinción del recinto indicado. El informe refleja el estado de la central, su modo de funcionamiento, señales de disparo, prealarma, alarma, avería, anulación, presostatos, pulsadores de paro/disparo, sirenas, carteles luminosos y relación con la central de detección cuando exista.`,
        [SECTIONS[1]]: `Se comprueba el estado de la central, pilotos, display, modo de funcionamiento, alimentación, baterías, líneas de detección asociadas al disparo, dispositivos manuales de paro y disparo, señalización acústica/luminosa, estado de botellas, presostatos y circuitos supervisados cuando el sistema lo permita. Las comprobaciones se documentan según el estado observado y sin efectuar descargas reales del agente extintor salvo indicación expresa y procedimiento específico.`,
        [SECTIONS[2]]: `La central queda descrita conforme al estado observado.`,
        [SECTIONS[3]]: `El informe puede encuadrarse en el Real Decreto 513/2017 RIPCI para instalaciones de protección contra incendios y, según el tipo de sistema, en normas UNE/EN aplicables a sistemas fijos de extinción automática, sistemas de detección asociados, dispositivos de disparo, señalización y componentes del sistema. Cuando el recinto pertenezca a edificio industrial se considerará además el RSCIEI vigente; para otros edificios, el CTE DB-SI cuando corresponda.

Real Decreto 513/2017, RIPCI: Reglamento principal aplicable a las instalaciones de protección contra incendios, incluyendo los sistemas fijos de extinción y sus centrales de control.
Anexo II del RIPCI: Define las operaciones mínimas de mantenimiento de los equipos y sistemas de protección contra incendios.
Centrales de extinción: Equipos de control asociados a sistemas fijos de extinción automática o manual, incluyendo supervisión, disparo, bloqueo, alarmas y averías.
Sistemas fijos de extinción automática: Sistemas incluidos en el RIPCI cuando formen parte de la protección activa del recinto.
Sistemas de detección asociados: Aplicables cuando la central de extinción recibe señales de detectores, pulsadores, presostatos u otros elementos de activación.
Dispositivos de disparo y bloqueo: Elementos vinculados al funcionamiento de la extinción, incluyendo pulsadores de disparo, pulsadores de paro, señales acústicas, ópticas y enclavamientos.
UNE-EN 12094: Norma de referencia para componentes de sistemas fijos de extinción por agentes gaseosos, incluyendo dispositivos eléctricos de control, retardo y disparo.
UNE-EN 15004: Aplicable a sistemas fijos de lucha contra incendios mediante agentes gaseosos, cuando la central gobierna este tipo de instalación.
UNE 23007: Aplicable cuando la central de extinción está asociada a sistemas de detección y alarma de incendios.
Real Decreto 314/2006, CTE: Aplicable cuando la instalación pertenece a edificios sujetos al Código Técnico de la Edificación.
CTE DB-SI: Documento Básico de Seguridad en caso de Incendio. Define exigencias de protección contra incendios en edificios.
Real Decreto 164/2025, RSCIEI: Aplicable cuando la central de extinción protege un recinto o establecimiento industrial.`,
        [SECTIONS[4]]: `La central de extinción ha sido verificada durante la intervención, revisándose las indicaciones disponibles en el equipo y el estado general de los elementos asociados al sistema de disparo y control. En la comprobación se han observado las señales presentes en la central, estados de servicio, posibles averías, anulaciones, alimentación, baterías, pulsadores de disparo y paro, señalización óptico-acústica, temporización, bloqueo y demás elementos accesibles relacionados con la instalación de extinción.

Las incidencias recogidas en el informe corresponden al estado mostrado por la central y a las condiciones apreciadas en los elementos comprobados en la fecha de revisión. El informe deja constancia técnica del estado observado durante el mantenimiento, limitándose a describir las señales, estados e incidencias existentes en el sistema, sin incorporar actuaciones posteriores ni compromisos de corrección no ejecutados en el momento de la inspección.`
      },
      [SYSTEMS[2]]: {
        [SECTIONS[0]]: `Se revisa el sistema de extinción instalado en la dependencia indicada, describiendo el tipo de protección existente: rociadores, extinción por gas, espuma, agua nebulizada, extinción en campana, sistema manual o sistema automático.`,
        [SECTIONS[1]]: `Se comprueban visualmente los componentes accesibles del sistema, incluyendo estado de tuberías, boquillas, rociadores, válvulas, manómetros, presostatos, botellas, soportes, señalización, mandos manuales y relación con central de detección/extinción. En sistemas por agente gaseoso se revisan botellas, latiguillos, colectores, pesaje o presión según proceda.`,
        [SECTIONS[2]]: `La central queda descrita conforme al estado observado.`,

    const emptySection = () => ({ fixed: "", voice: "" });

    const defaultState = () => ({
      nextNumber: 1,
      current: {
        number: 1,
        header: "",
        revisionNumber: "1 RT-2026",
        revisionText: "TRIMESTRAL",
        systems: {},
        entries: []
      },
      fixedTexts: cloneData(DEFAULT_FIXED_TEXTS),
      savedReports: []
    });

    let appState = loadState();
    let activeSystem = "";
    let activeEntryId = "";
    let previewMode = "entry";
    let activeRecognition = null;

    const els = {
      homeScreen: document.getElementById("homeScreen"),
      systemScreen: document.getElementById("systemScreen"),
      previewScreen: document.getElementById("previewScreen"),
      currentReportNumber: document.getElementById("currentReportNumber"),
      reportHeader: document.getElementById("reportHeader"),
      revisionNumber: document.getElementById("revisionNumber"),
      revisionText: document.getElementById("revisionText"),
      systemButtons: document.getElementById("systemButtons"),
      preparedEntries: document.getElementById("preparedEntries"),
      savedReports: document.getElementById("savedReports"),
      homeStatus: document.getElementById("homeStatus"),
      clearAppDataBtn: document.getElementById("clearAppDataBtn"),
      systemTitle: document.getElementById("systemTitle"),
      systemSubtitle: document.getElementById("systemSubtitle"),
      sectionContainer: document.getElementById("sectionContainer"),
      photoContainer: document.getElementById("photoContainer"),
      metaClient: document.getElementById("metaClient"),
      metaBuilding: document.getElementById("metaBuilding"),
      metaSystem: document.getElementById("metaSystem"),
      metaDenomination: document.getElementById("metaDenomination"),
      systemStatus: document.getElementById("systemStatus"),
      mountedPreview: document.getElementById("mountedPreview"),
      previewSubtitle: document.getElementById("previewSubtitle"),
      previewStatus: document.getElementById("previewStatus")
    };

    const dbPromise = new Promise(resolve => {
      if (!("indexedDB" in window)) {
        resolve(null);
        return;
      }
      const request = indexedDB.open(DB_NAME, 1);
      request.onupgradeneeded = () => {
        const db = request.result;
        if (!db.objectStoreNames.contains(DB_STORE)) db.createObjectStore(DB_STORE);
      };
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => resolve(null);
      request.onblocked = () => resolve(null);
    });

    function loadState() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        const state = parsed && parsed.current ? parsed : defaultState();
        return normalizeLoadedState(state);
      } catch (error) {
        return defaultState();
      }
    }

    function normalizeLoadedState(state) {
      state.nextNumber = Number(state.nextNumber || state.current?.number || 1);
      state.current = state.current || { number: state.nextNumber, header: "", systems: {} };
      state.current.number = Number(state.current.number || state.nextNumber || 1);
      state.current.header = state.current.header || "";
      state.current.revisionNumber = (state.current.revisionNumber || "1 RT-2026").toUpperCase();
      state.current.revisionText = (state.current.revisionText || "TRIMESTRAL").toUpperCase();
      state.current.systems = state.current.systems || {};
      state.current.entries = Array.isArray(state.current.entries) ? state.current.entries : entriesFromSystems(state.current.systems);
      state.current.editingId = state.current.editingId || null;
      state.fixedTexts = mergeDefaultFixedTexts(state.fixedTexts || {});
      state.savedReports = Array.isArray(state.savedReports) ? state.savedReports : [];
      return state;
    }

    function mergeDefaultFixedTexts(fixedTexts) {
      const merged = cloneData(DEFAULT_FIXED_TEXTS);
      Object.entries(fixedTexts || {}).forEach(([system, sections]) => {
        if (!merged[system]) merged[system] = {};
        Object.entries(sections || {}).forEach(([section, text]) => {
          if (text) merged[system][section] = text;
        });
      });
      return merged;
    }

    function saveState() {
      saveStateToDb(appState);
      return saveStateToLocalStorage();
    }

    function saveStateToLocalStorage() {
      try {
        localStorage.removeItem(STORAGE_KEY);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(makeLocalStorageState(appState)));
        return true;
      } catch (error) {
        const target = els.systemScreen.classList.contains("active")
          ? els.systemStatus
          : els.previewScreen.classList.contains("active")
            ? els.previewStatus
            : els.homeStatus;
        setStatus(target, "No se pudo guardar. Reduce el tamaño o número de fotos.", true);
        return false;
      }
    }

    function makeLocalStorageState(state) {
      const copy = cloneData(state);
      stripHeavyReportData(copy);
      return copy;
    }

    function stripHeavyReportData(state) {
      (state.current?.entries || []).forEach(entry => stripHeavyEntryData(entry));
      (state.savedReports || []).forEach(report => {
        (report.sourceEntries || []).forEach(entry => stripHeavyEntryData(entry));
        (report.systems || []).forEach(system => {
          system.photos = [];
          system.html = "";
        });
      });
    }

    function stripHeavyEntryData(entry) {
      entry.photos = (entry.photos || []).map(() => null);
      entry.mountedHtml = "";
    }

    async function saveStateToDb(state) {
      const db = await dbPromise;
      if (!db) return false;
      return await new Promise(resolve => {
        const tx = db.transaction(DB_STORE, "readwrite");
        tx.objectStore(DB_STORE).put(cloneData(state), STORAGE_KEY);
        tx.oncomplete = () => resolve(true);
        tx.onerror = () => resolve(false);
      });
    }

    async function loadStateFromDb() {
      const db = await dbPromise;
      if (!db) return null;
      return await new Promise(resolve => {
        const tx = db.transaction(DB_STORE, "readonly");
        const request = tx.objectStore(DB_STORE).get(STORAGE_KEY);
        request.onsuccess = () => resolve(request.result || null);
        request.onerror = () => resolve(null);
      });
    }

    async function clearStateFromDb() {
      const db = await dbPromise;
      if (!db) return;
      await new Promise(resolve => {
        const tx = db.transaction(DB_STORE, "readwrite");
        tx.objectStore(DB_STORE).delete(STORAGE_KEY);
        tx.oncomplete = resolve;
        tx.onerror = resolve;
      });
    }

    async function restoreStateFromDb() {
      const stored = await loadStateFromDb();
      if (!stored) return;
      const localSavedCount = Array.isArray(appState.savedReports) ? appState.savedReports.length : 0;
      const dbSavedCount = Array.isArray(stored.savedReports) ? stored.savedReports.length : 0;
      const localPhotoCount = countPhotos(appState);
      const dbPhotoCount = countPhotos(stored);
      if (dbSavedCount > localSavedCount || dbPhotoCount > localPhotoCount) {
        appState = stored;
        normalizeLoadedState(appState);
        renderHome();
        setStatus(els.homeStatus, "Datos restaurados.");
      }
    }

    function countPhotos(state) {
      const currentPhotos = (state.current?.entries || []).reduce((count, entry) => count + (entry.photos || []).filter(Boolean).length, 0);
      const savedPhotos = (state.savedReports || []).reduce((count, report) => {
        const fromEntries = (report.sourceEntries || []).reduce((subtotal, entry) => subtotal + (entry.photos || []).filter(Boolean).length, 0);
        const fromSystems = (report.systems || []).reduce((subtotal, system) => subtotal + (system.photos || []).filter(Boolean).length, 0);
        return count + fromEntries + fromSystems;
      }, 0);
      return currentPhotos + savedPhotos;
    }

    function setStatus(el, message, isError = false) {
      el.textContent = message;
      el.classList.toggle("error", isError);
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function showScreen(name) {
      [els.homeScreen, els.systemScreen, els.previewScreen].forEach(screen => screen.classList.remove("active"));
      document.getElementById(name).classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function makeEntry(system) {
      return {
        id: makeId(),
        type: system,
        meta: {
          client: appState.current.header || "",
          building: "",
          system,
          denomination: system
        },
        sections: {},
        photos: [],
        mountedHtml: "",
        mountedText: ""
      };
    }

    function entriesFromSystems(systems) {
      return Object.entries(systems || {}).map(([system, data]) => ({
        id: makeId(),
        type: system,
        meta: {
          client: "",
          building: "",
          system,
          denomination: system
        },
        sections: data.sections || {},
        photos: data.photos || [],
        mountedHtml: data.mountedHtml || "",
        mountedText: data.mountedText || ""
      }));
    }

    function ensureEntry(entryId) {
      let target = appState.current.entries.find(entry => entry.id === entryId);
      if (!target) {
        target = makeEntry(activeSystem || SYSTEMS[0]);
        appState.current.entries.push(target);
        activeEntryId = target.id;
      }

      if (!target.meta) {
        target.meta = {
          client: appState.current.header || "",
          building: "",
          system: target.type,
          denomination: target.type
        };
      }
      SECTIONS.forEach(section => {
        if (!target.sections[section]) target.sections[section] = emptySection();
        if (!appState.fixedTexts[target.type]) appState.fixedTexts[target.type] = {};
        if (!appState.fixedTexts[target.type][section]) appState.fixedTexts[target.type][section] = "";
        if (!target.sections[section].fixed) {
          target.sections[section].fixed = appState.fixedTexts[target.type][section];
        }
      });

      while (target.photos.length < 10) target.photos.push(null);
      target.photos = target.photos.slice(0, 10);
      return target;
    }

    function renderHome() {
      normalizeSavedReports();
      appState.current.number = appState.current.number || appState.nextNumber || 1;
      els.currentReportNumber.textContent = `Informe ${appState.current.number}`;
      els.reportHeader.value = appState.current.header || "";
      els.revisionNumber.value = (appState.current.revisionNumber || "1 RT-2026").toUpperCase();
      els.revisionText.value = (appState.current.revisionText || "TRIMESTRAL").toUpperCase();

      els.systemButtons.innerHTML = SYSTEMS.map(system => `
        <button class="btn lime" type="button" data-system="${escapeHtml(system)}">${escapeHtml(system)}</button>
      `).join("");

      els.preparedEntries.innerHTML = appState.current.entries.length
        ? appState.current.entries.map((entry, index) => `
          <div class="prepared-item">
            <div>
              <strong>${index + 1}. ${escapeHtml(entry.type)}</strong>
            </div>
            <div class="button-row">
              <button class="btn blue" type="button" data-edit-entry="${entry.id}">Editar</button>
              <button class="btn red" type="button" data-remove-entry="${entry.id}">Quitar</button>
            </div>
          </div>
        `).join("")
        : '<div class="empty">Pulsa un sistema amarillo para añadirlo al informe actual.</div>';

      const reports = [...appState.savedReports].sort((a, b) => Number(a.number) - Number(b.number));
      els.savedReports.innerHTML = reports.length
        ? reports.map(report => `
          <div class="saved-item">
            <div class="saved-title">Informe ${report.number}</div>
            <div class="saved-meta">${escapeHtml((report.header || "").toUpperCase())}<br>${report.systems.length} sistema(s) grabado(s)</div>
            <div class="button-row">
              <button class="btn pink" type="button" data-action="open" data-id="${report.id}">Abrir / rectificar</button>
              <button class="btn green" type="button" data-action="pdf" data-id="${report.id}">PDF</button>
              <button class="btn blue" type="button" data-action="word" data-id="${report.id}">Word</button>
              <button class="btn red" type="button" data-action="delete" data-id="${report.id}">Borrar</button>
            </div>
          </div>
        `).join("")
        : '<div class="empty">Todavía no hay informes grabados.</div>';
    }

    function renderEntry(entryId) {
      activeEntryId = entryId;
      const data = ensureEntry(entryId);
      activeSystem = data.type;
      els.systemTitle.textContent = data.type;
      els.systemSubtitle.textContent = `Informe ${appState.current.number}`;
      els.metaClient.value = data.meta.client || appState.current.header || "";
      els.metaBuilding.value = data.meta.building || "";
      els.metaSystem.value = data.meta.system || data.type;
      els.metaDenomination.value = data.meta.denomination || data.type;
      els.sectionContainer.innerHTML = SECTIONS.map(section => {
        const value = data.sections[section];
        return `
          <div class="section-block">
            <div class="section-head">
              <div class="section-title">${escapeHtml(section)}</div>
              <button class="btn blue" type="button" data-dictate="${escapeHtml(section)}">Redacción por voz</button>
            </div>

                <label>Texto fijo</label>
                <textarea data-fixed="${escapeHtml(section)}" placeholder="Texto fijo para este apartado y sistema">${escapeHtml(value.fixed)}</textarea>
              </div>

                <label>Texto redactado por voz</label>
                <textarea data-voice="${escapeHtml(section)}" placeholder="Aquí aparecerá o se escribirá el texto dictado">${escapeHtml(value.voice)}</textarea>
              </div>
            </div>

      }).join("");

      els.photoContainer.innerHTML = data.photos.map((photo, index) => `

          <button class="btn red" type="button" data-delete-photo="${index}">Eliminar foto</button>
        </div>
      `).join("");

      setStatus(els.systemStatus, "");
      showScreen("systemScreen");
      saveState();

    function saveSystemInputs() {
      if (!activeEntryId) return;
      const data = ensureEntry(activeEntryId);
      data.meta.client = els.metaClient.value;
      data.meta.building = els.metaBuilding.value;
      data.meta.system = els.metaSystem.value;
      data.meta.denomination = els.metaDenomination.value;
      document.querySelectorAll("[data-fixed]").forEach(textarea => {
        const section = textarea.dataset.fixed;
        data.sections[section].fixed = textarea.value;
        if (!appState.fixedTexts[data.type]) appState.fixedTexts[data.type] = {};
        appState.fixedTexts[data.type][section] = textarea.value;
      });
      document.querySelectorAll("[data-voice]").forEach(textarea => {
        const section = textarea.dataset.voice;
        data.sections[section].voice = textarea.value;
      });
      saveState();
    }

    function startDictation(section) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const target = document.querySelector(`[data-voice="${CSS.escape(section)}"]`);

      if (!SpeechRecognition || !target) {
        setStatus(els.systemStatus, "El dictado por voz no está disponible en este navegador.", true);
        return;
      }

      if (activeRecognition) activeRecognition.stop();
      const recognition = new SpeechRecognition();
      recognition.lang = "es-ES";
      recognition.continuous = false;
      recognition.interimResults = false;
      activeRecognition = recognition;

      recognition.onstart = () => setStatus(els.systemStatus, `Escuchando: ${section}`);
      recognition.onerror = () => setStatus(els.systemStatus, "No se pudo completar el dictado.", true);
      recognition.onresult = event => {
        const transcript = Array.from(event.results)
          .map(result => result[0].transcript)
          .join(" ")
          .trim();
        target.value = [target.value.trim(), transcript].filter(Boolean).join("\n");
        saveSystemInputs();
        setStatus(els.systemStatus, "Texto dictado añadido.");
      };
      recognition.onend = () => { activeRecognition = null; };
      recognition.start();
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
      });
    }

    function compressImageFile(file, maxSide = 1280, quality = 0.72) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          URL.revokeObjectURL(url);
          const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
          const width = Math.max(1, Math.round(img.width * scale));
          const height = Math.max(1, Math.round(img.height * scale));
          const canvas = document.createElement("canvas");
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL("image/jpeg", quality));
        };
        img.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error("No se pudo leer la imagen."));
        };
        img.src = url;
      });
    }

    function buildSystemReport(entryId) {
      saveSystemInputs();
      const data = ensureEntry(entryId);
      const report = composeEntryReport(data);

      data.mountedHtml = report.html;
      data.mountedText = report.text;
      saveState();
      return report;
    }

    function composeEntryReport(data) {
      const sectionHtml = SECTIONS.map(section => {
        const item = data.sections?.[section] || emptySection();
        const fixed = item.fixed.trim();
        const voice = item.voice.trim();
        const paragraph = composeParagraph(section, fixed, voice);
        return `<h3>${escapeHtml(section)}</h3><p>${escapeHtml(paragraph)}</p>`;
      }).join("");

      const photos = (data.photos || []).filter(Boolean);
      const photoHtml = photos.length
        ? `<div class="photo-title">ANEXO FOTOGRÁFICO</div><div class="photo-grid">${photos.map(src => `<img src="${src}" alt="">`).join("")}</div>`
        : `<div class="photo-title">ANEXO FOTOGRÁFICO</div>`;

      const html = `
        <section class="doc-part">
          <div class="doc-system-title">${escapeHtml(data.type)}</div>
          ${sectionHtml}
          ${photoHtml}
        </section>
      `;

      const text = [
        data.type,
        ...SECTIONS.flatMap(section => {
          const item = data.sections?.[section] || emptySection();
          return [
            section,
            composeParagraph(section, item.fixed.trim(), item.voice.trim())
          ];
        }),
        "ANEXO FOTOGRÁFICO"
      ].join("\n\n");

      return { html, text };
    }

    function buildReportCover(report) {
      const header = (report.header || "INFORME").toUpperCase();
      const revisionNumber = (report.revisionNumber || "1 RT-2026").toUpperCase();
      const revisionText = (report.revisionText || "TRIMESTRAL").toUpperCase();
      const rows = report.systems.map(system => `
        <tr>
          <td>${escapeHtml(system.meta?.building || "")}</td>
          <td>${escapeHtml(system.meta?.system || system.name)}</td>
          <td>${escapeHtml(system.meta?.denomination || system.name)}</td>
        </tr>
      `).join("");

      return `
        <div class="doc-main-title">${escapeHtml(header)}</div>
        <div class="doc-revision-row">
          <div><strong>Nº REVISIÓN:</strong> ${escapeHtml(revisionNumber)}</div>
          <div><strong>REVISIÓN:</strong> ${escapeHtml(revisionText)}</div>
        </div>
        <table class="summary-table">
          <tr><th class="summary-client" colspan="3">CLIENTE: <span>${escapeHtml(report.systems[0]?.meta?.client || header)}</span></th></tr>
          <tr>
            <th class="summary-head">EDIFICIO</th>
            <th class="summary-head">SISTEMA</th>
            <th class="summary-head">DENOMINACIÓN</th>
          </tr>
          ${rows || '<tr><td></td><td></td><td></td></tr>'}
        </table>
      `;
    }

    function composeParagraph(section, fixed, voice) {
      const content = [fixed, voice].filter(Boolean).join(" ");
      if (!content) return "No se han indicado datos para este apartado.";

      if (section.includes("Antecedentes")) {
        return `Se toma como antecedente la información aportada para el sistema, dejando constancia de las condiciones observadas y de los datos relevantes para valorar la instalación. ${content}`;
      }
      if (section.includes("Comprobaciones")) {
        return `Se realizan comprobaciones visuales y funcionales sobre los elementos descritos, atendiendo a su estado, accesibilidad, señalización, alimentación, supervisión y respuesta prevista. ${content}`;
      }
      if (section.includes("Estado")) {
        return `El estado del sistema se valora conforme a las observaciones registradas, diferenciando los elementos operativos de aquellos que requieren revisión, reparación o sustitución. ${content}`;
      }
      if (section.includes("Normativa")) {
        return `La valoración se relaciona con la normativa de protección contra incendios aplicable, el RIPCI y las normas UNE que correspondan al sistema inspeccionado. ${content}`;
      }
      return `Como conclusión técnica, se recoge la actuación o seguimiento necesario para dejar el sistema en condiciones adecuadas de servicio y mantenimiento. ${content}`;
    }

    async function saveCurrentReport() {
      saveSystemInputs();
      const systems = collectCurrentSystems();

      if (!systems.length && !appState.current.header.trim()) {
        setStatus(els.homeStatus, "No hay datos para grabar.", true);
        return;
      }

      const existingIndex = appState.savedReports.findIndex(report =>
        appState.current.editingId && report.id === appState.current.editingId
      );
      const report = {
        id: existingIndex >= 0 ? appState.savedReports[existingIndex].id : makeId(),
        number: appState.current.number,
        header: appState.current.header,
        revisionNumber: appState.current.revisionNumber,
        revisionText: appState.current.revisionText,
        systems,
        sourceSystems: cloneData(appState.current.systems),
        sourceEntries: cloneData(appState.current.entries),
        createdAt: new Date().toISOString()
      };
      const previousCurrent = cloneData(appState.current);
      const previousReports = cloneData(appState.savedReports);
      const previousNextNumber = appState.nextNumber;

      if (existingIndex >= 0) appState.savedReports[existingIndex] = report;
      else appState.savedReports.push(report);

      normalizeSavedReports();
      appState.nextNumber = getNextReportNumber();
      appState.current = {
        number: appState.nextNumber,
        header: "",
        revisionNumber: "1 RT-2026",
        revisionText: "TRIMESTRAL",
        systems: {},
        entries: [],
        editingId: null
      };
      const dbOk = await saveStateToDb(appState);
      const localOk = saveStateToLocalStorage();
      const needsPhotoStorage = reportHasPhotos(report);
      if ((needsPhotoStorage && !dbOk) || (!needsPhotoStorage && !dbOk && !localOk)) {
        appState.current = previousCurrent;
        appState.savedReports = previousReports;
        appState.nextNumber = previousNextNumber;
        renderHome();
        setStatus(els.homeStatus, "No se pudo grabar el informe con las fotos. Reduce el tamaño o número de fotos.", true);
        showScreen("homeScreen");
        return;
      }
      renderHome();
      setStatus(els.homeStatus, `Informe ${report.number} grabado.`);
      showScreen("homeScreen");
    }

    function reportHasPhotos(report) {
      return (report.sourceEntries || []).some(entry => (entry.photos || []).some(Boolean))
        || (report.systems || []).some(system => (system.photos || []).some(Boolean));
    }

    function collectCurrentSystems() {
      return appState.current.entries
        .map(entry => ({ name: entry.type, data: ensureEntry(entry.id) }))
        .filter(item => item.data.mountedHtml || hasSystemContent(item.data))
        .map(item => {
          buildSystemReport(item.data.id);
          return {
            name: item.name,
            meta: cloneData(item.data.meta),
            html: item.data.mountedHtml,
            text: item.data.mountedText,
            photos: item.data.photos.filter(Boolean)
          };
        });
    }

    function makeCurrentReportSnapshot() {
      saveSystemInputs();
      return {
        id: "current",
        number: appState.current.number,
        header: appState.current.header,
        revisionNumber: appState.current.revisionNumber,
        revisionText: appState.current.revisionText,

        createdAt: new Date().toISOString()
      };
    }

    function makeAllReportsSnapshot() {
      const current = makeCurrentReportSnapshot();
      const reports = [...appState.savedReports];
      if (current.systems.length || current.header.trim()) reports.push(current);
      return {
        id: "all",
        number: "todo",
        header: "TODOS LOS INFORMES",
        systems: reports.flatMap(report => report.systems),
        createdAt: new Date().toISOString()
      };

    function hasSystemContent(data) {
      return SECTIONS.some(section => {
        const item = data.sections[section] || emptySection();
        return item.fixed.trim() || item.voice.trim();
      }) || data.photos.some(Boolean);
    }

    function makeId() {
      if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
      return `report-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function normalizeSavedReports() {
      const byId = new Map();
      appState.savedReports.forEach(report => {
        if (!report.id) report.id = makeId();
        report.number = Number(report.number || 0);
        report.systems = Array.isArray(report.systems) ? report.systems : [];
        byId.set(report.id, report);
      });
      appState.savedReports = [...byId.values()]
        .filter(report => report.number > 0)
        .sort((a, b) => a.number - b.number);
    }

    function getNextReportNumber() {
      normalizeSavedReports();
      const maxSaved = appState.savedReports.reduce((max, report) => Math.max(max, Number(report.number || 0)), 0);
      return maxSaved + 1;
    }

    function cloneData(value) {
      return JSON.parse(JSON.stringify(value || {}));
    }

    function systemsFromSavedReport(report) {
      if (report.sourceSystems) return cloneData(report.sourceSystems);

      const systems = {};
      (report.systems || []).forEach(item => {
        const sections = {};
        SECTIONS.forEach(section => {
          sections[section] = emptySection();
        });
        sections[SECTIONS[0]].voice = item.text || "";
        systems[item.name] = {
          sections,
          photos: item.photos || [],
          mountedHtml: item.html || "",
          mountedText: item.text || ""
        };
      });
      return systems;
    }

    function entriesFromSavedReport(report) {
      if (report.sourceEntries) return cloneData(report.sourceEntries);
      if (report.sourceSystems) return entriesFromSystems(report.sourceSystems);

      return (report.systems || []).map(item => ({
        id: makeId(),
        type: item.name,
        meta: item.meta || {
          client: report.header || "",
          building: "",
          system: item.name,
          denomination: item.name
        },
        sections: { [SECTIONS[0]]: { fixed: "", voice: item.text || "" } },
        photos: item.photos || [],
        mountedHtml: item.html || "",
        mountedText: item.text || ""
      }));
    }

    function openSavedReport(report) {
      const entries = entriesFromSavedReport(report);
      const firstEntryId = entries[0]?.id || "";
      appState.current = {
        number: report.number,
        header: report.header || "",
        revisionNumber: report.revisionNumber || "1 RT-2026",
        revisionText: report.revisionText || "TRIMESTRAL",
        systems: systemsFromSavedReport(report),
        entries,
        editingId: report.id
      };
      appState.nextNumber = getNextReportNumber();
      saveState();
      renderHome();
      setStatus(els.homeStatus, `Informe ${report.number} abierto para rectificar.`);
      if (firstEntryId) renderEntry(firstEntryId);
      else showScreen("homeScreen");
    }

    function clearCurrentReport() {
      if (appState.current.editingId) {
        const deleted = appState.savedReports.find(report => report.id === appState.current.editingId);
        appState.savedReports = appState.savedReports.filter(report => report.id !== appState.current.editingId);
        appState.nextNumber = getNextReportNumber();
        appState.current = {
            number: appState.nextNumber,
            header: "",
            revisionNumber: "1 RT-2026",
            revisionText: "TRIMESTRAL",
            systems: {},
            entries: [],
            editingId: null
        };
        saveState();
        renderHome();
        setStatus(els.homeStatus, deleted ? `Informe ${deleted.number} borrado.` : "Informe actual borrado.");
        showScreen("homeScreen");
        return;
      }

      appState.nextNumber = Math.max(getNextReportNumber(), Number(appState.current.number || 0) + 1);
      appState.current = {
        number: appState.nextNumber,
        header: "",
        revisionNumber: "1 RT-2026",
        revisionText: "TRIMESTRAL",
        systems: {},
        entries: [],
        editingId: null
      };
      saveState();
      renderHome();
      setStatus(els.homeStatus, "Informe actual borrado.");
      showScreen("homeScreen");
    }

    function buildFullHtml(report) {
      const systems = systemsForOutput(report);
      return `<div class="doc">${buildReportCover({ ...report, systems })}${systems.map(system => system.html).join('<div style="page-break-after: always;"></div>')}</div>`;
    }

    function buildFullText(report) {
      const systems = systemsForOutput(report);
      const header = [
        (report.header || "INFORME").toUpperCase(),
        `Nº REVISIÓN: ${(report.revisionNumber || "1 RT-2026").toUpperCase()}`,
        `REVISIÓN: ${(report.revisionText || "TRIMESTRAL").toUpperCase()}`,
        "CUADRO RESUMEN",
        ...systems.map(system => `${system.meta?.building || ""} | ${system.meta?.system || system.name} | ${system.meta?.denomination || system.name}`)
      ].join("\n");
      return `${header}\n\n${systems.map(system => system.text).join("\n\n------------------------------\n\n")}`;
    }

    function systemsForOutput(report) {
      if (Array.isArray(report.sourceEntries) && report.sourceEntries.length) {
        return report.sourceEntries.map(entry => {
          const built = composeEntryReport(entry);
          return {
            name: entry.type,
            meta: cloneData(entry.meta),
            html: built.html,
            text: built.text,
            photos: (entry.photos || []).filter(Boolean)
          };
        });
      }
      return Array.isArray(report.systems) ? report.systems : [];
    }

    function downloadWord(html, filename) {
      const documentHtml = `
        <!doctype html>
        <html>
        <head>
          <meta charset="utf-8">
          <style>
            body { font-family: Arial, sans-serif; font-size: 11pt; color: #111; }
            .doc-main-title { text-align: center; text-transform: uppercase; font-size: 14pt; font-weight: 700; margin-bottom: 18px; }
            .doc-revision-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
            .summary-table { width: 100%; border-collapse: collapse; margin-bottom: 18px; }
            .summary-table th, .summary-table td { border: 1px solid #222; padding: 4px 6px; }
            .summary-client { background: #d4c4f0; text-align: left; font-weight: 700; }
            .summary-head { background: #ae93e4; text-align: center; font-weight: 700; }
            .summary-table td { background: #e5dcf5; }
            .doc-system-title { text-align: center; font-size: 13pt; font-weight: 700; margin-bottom: 16px; }
            h3 { font-size: 11.5pt; margin: 14px 0 6px; }
            p { margin: 0 0 8px; }
            .photo-title { text-align: center; text-transform: uppercase; font-size: 14pt; font-weight: 700; margin: 22px 0 14px; }
            .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
            .photo-grid img { width: 48%; margin: 1%; vertical-align: top; }
          </style>
        </head>
        <body>${html}</body>
        </html>
      `;
      downloadBlob(new TextEncoder().encode(documentHtml), "application/msword", filename);
    }

    function downloadPdfFromText(text, filename) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: "pt", format: "a4" });
      const margin = 42;
      const maxWidth = 511;
      const lines = doc.splitTextToSize(text, maxWidth);
      let y = margin;
      doc.setFont("helvetica", "normal");
      doc.setFontSize(10.5);
      lines.forEach(line => {
        if (y > 800) {
          doc.addPage();
          y = margin;
        }
        doc.text(line, margin, y);
        y += 14;
      });
      doc.save(filename);
    }

    async function downloadPdfFromHtml(html, filename) {
      const { jsPDF } = window.jspdf;
      const host = document.createElement("div");
      host.style.position = "fixed";
      host.style.left = "-10000px";
      host.style.top = "0";
      host.style.width = "794px";
      host.style.background = "#ffffff";
      host.style.padding = "32px";
      host.innerHTML = html;
      document.body.appendChild(host);

      try {
        const canvas = await html2canvas(host, {
          scale: 2,
          backgroundColor: "#ffffff",
          useCORS: true
        });
        const pdf = new jsPDF({ unit: "pt", format: "a4" });
        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();
        const margin = 28;
        const imgWidth = pageWidth - margin * 2;
        const imgHeight = canvas.height * imgWidth / canvas.width;
        const pageCanvas = document.createElement("canvas");
        const pageCtx = pageCanvas.getContext("2d");
        const sourcePageHeight = Math.floor((pageHeight - margin * 2) * canvas.width / imgWidth);
        pageCanvas.width = canvas.width;
        pageCanvas.height = sourcePageHeight;

        let sourceY = 0;
        let pageIndex = 0;
        while (sourceY < canvas.height) {
          pageCtx.clearRect(0, 0, pageCanvas.width, pageCanvas.height);
          pageCtx.fillStyle = "#ffffff";
          pageCtx.fillRect(0, 0, pageCanvas.width, pageCanvas.height);
          pageCtx.drawImage(
            canvas,
            0,
            sourceY,
            canvas.width,
            Math.min(sourcePageHeight, canvas.height - sourceY),
            0,
            0,
            canvas.width,
            Math.min(sourcePageHeight, canvas.height - sourceY)
          );
          if (pageIndex > 0) pdf.addPage();
          const pageData = pageCanvas.toDataURL("image/jpeg", 0.92);
          const sliceHeight = Math.min(sourcePageHeight, canvas.height - sourceY) * imgWidth / canvas.width;
          pdf.addImage(pageData, "JPEG", margin, margin, imgWidth, sliceHeight);
          sourceY += sourcePageHeight;
          pageIndex += 1;
        }
        pdf.save(filename);
      } finally {
        host.remove();
      }
    }

    function downloadBlob(bytes, type, filename) {
      const blob = new Blob([bytes], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

        return;
      }

      const removeButton = event.target.closest("[data-remove-entry]");
      if (removeButton) {
        appState.current.entries = appState.current.entries.filter(entry => entry.id !== removeButton.dataset.removeEntry);
        saveState();
        renderHome();
      }
    });

    [els.metaClient, els.metaBuilding, els.metaSystem, els.metaDenomination].forEach(input => {
      input.addEventListener("input", saveSystemInputs);
    });

    els.savedReports.addEventListener("click", event => {
      const button = event.target.closest("[data-action]");
      if (!button) return;
      const report = getReport(button.dataset.id);
      if (!report) return;

      if (button.dataset.action === "delete") {
        appState.savedReports = appState.savedReports.filter(item => item.id !== report.id);
        if (appState.current.editingId === report.id) {
          appState.current = {
            number: appState.nextNumber || 1,
            header: "",
            systems: {},
            editingId: null
          };
        }
        saveState();
        renderHome();
        setStatus(els.homeStatus, `Informe ${report.number} borrado.`);
      }
      if (button.dataset.action === "open") {
        openSavedReport(report);
      }
      if (button.dataset.action === "word") {
        downloadWord(buildFullHtml(report), `informe-${report.number}.doc`);
      }
      if (button.dataset.action === "pdf") {
        downloadPdfFromHtml(buildFullHtml(report), `informe-${report.number}.pdf`);
      }
    });

    els.sectionContainer.addEventListener("input", saveSystemInputs);
    els.sectionContainer.addEventListener("click", event => {
      const button = event.target.closest("[data-dictate]");
      if (button) startDictation(button.dataset.dictate);
    });

    els.photoContainer.addEventListener("change", async event => {
      const input = event.target.closest("[data-photo]");
      if (!input || !input.files[0]) return;
      const data = ensureEntry(activeEntryId);
      const index = Number(input.dataset.photo);
      try {
        const previous = data.photos[index];
        data.photos[index] = await compressImageFile(input.files[0]);
        data.mountedHtml = "";
        data.mountedText = "";
        if (!saveState()) {
          data.photos[index] = previous;
          return;
        }
        renderEntry(activeEntryId);
      } catch (error) {
        setStatus(els.systemStatus, "No se pudo cargar la imagen.", true);
      }
    });

    els.photoContainer.addEventListener("click", event => {
      const button = event.target.closest("[data-delete-photo]");
      if (!button) return;
      const data = ensureEntry(activeEntryId);
      data.photos[Number(button.dataset.deletePhoto)] = null;
      data.mountedHtml = "";
      data.mountedText = "";
      saveState();
      renderEntry(activeEntryId);
    });

    renderHome();
    restoreStateFromDb();
  </script>
</body>
</html>
