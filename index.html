<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SISTEMAS</title>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
  <style>
    :root {
      --lime: #d7ff00;
      --lime-strong: #a6d900;
      --pink: #ff4fa3;
      --green: #22a447;
      --blue: #1266d6;
      --red: #d92d20;
      --ink: #10140d;
      --muted: #5b6252;
      --paper: #fbfff0;
      --panel: #f6ffc7;
      --line: #cfff2e;
      --white: #ffffff;
      --shadow: 0 18px 45px rgba(70, 110, 0, .16);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(215, 255, 0, .48), transparent 34rem),
        linear-gradient(135deg, #fbffe9 0%, #ffffff 48%, #efffbf 100%);
    }

    button, input, textarea { font: inherit; }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 44px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--lime);
      box-shadow: var(--shadow);
      font-weight: 700;
    }

    h1, h2, h3, p { margin-top: 0; }

    h1 {
      margin-bottom: 4px;
      font-size: clamp(1.65rem, 3vw, 2.4rem);
      letter-spacing: 0;
    }

    h2 { margin-bottom: 12px; }

    .subhead {
      margin: 0;
      color: var(--muted);
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .panel {
      background: rgba(251, 255, 240, .94);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 18px;
    }

    .toolbar, .button-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .toolbar {
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .btn {
      border: 1px solid var(--lime-strong);
      border-radius: 8px;
      padding: 10px 14px;
      min-height: 42px;
      background: var(--white);
      color: var(--ink);
      cursor: pointer;
      font-weight: 700;
    }

    .btn:hover { filter: brightness(.98); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn.lime { background: var(--lime); }
    .btn.pink { background: var(--pink); border-color: #d93686; color: #fff; }
    .btn.green { background: var(--green); border-color: #15803d; color: #fff; }
    .btn.blue { background: var(--blue); border-color: #0b56b4; color: #fff; }
    .btn.red { background: var(--red); border-color: #b42318; color: #fff; }

    .report-number {
      font-size: 1.08rem;
      background: var(--lime);
      border: 1px solid var(--lime-strong);
      border-radius: 8px;
      padding: 12px 16px;
      font-weight: 700;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-weight: 700;
    }

    input[type="text"], textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      color: var(--ink);
      padding: 11px 12px;
    }

    textarea {
      min-height: 112px;
      resize: vertical;
    }

    .field { margin-bottom: 16px; }

    .systems {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .systems .btn {
      min-height: 70px;
      white-space: normal;
    }

    .saved-list {
      display: grid;
      gap: 10px;
    }

    .saved-item {
      display: grid;
      grid-template-columns: minmax(120px, .35fr) minmax(180px, 1fr) auto;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 12px;
    }

    .saved-title {
      font-weight: 700;
    }

    .saved-meta {
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .section-block {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .7);
      padding: 14px;
      margin-bottom: 14px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .section-title {
      font-weight: 700;
      font-size: 1.08rem;
    }

    .two-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .photos {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }

    .photo-slot {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      padding: 10px;
      min-width: 0;
    }

    .photo-preview {
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: 6px;
      border: 1px dashed var(--line);
      background: var(--panel);
      display: grid;
      place-items: center;
      color: var(--muted);
      overflow: hidden;
      margin-bottom: 8px;
      font-size: .9rem;
      text-align: center;
    }

    .photo-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photo-slot input { width: 100%; margin-bottom: 8px; }
    .photo-slot .btn { width: 100%; }

    .preview-shell {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 24px;
      overflow: auto;
      max-height: 70vh;
    }

    .doc {
      font-family: Arial, Helvetica, sans-serif;
      color: #111;
      line-height: 1.45;
    }

    .doc .doc-main-title {
      text-align: center;
      text-transform: uppercase;
      font-size: 14pt;
      font-weight: 700;
      margin: 0 0 18px;
    }

    .doc .doc-system-title {
      text-align: center;
      font-size: 13pt;
      font-weight: 700;
      margin: 0 0 16px;
    }

    .doc h3 {
      font-size: 11.5pt;
      margin: 14px 0 6px;
    }

    .doc p { margin: 0 0 8px; }

    .doc .photo-title {
      text-align: center;
      text-transform: uppercase;
      font-size: 14pt;
      font-weight: 700;
      margin: 22px 0 14px;
    }

    .doc .photo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .doc .photo-grid img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border: 1px solid #ddd;
    }

    .empty {
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 14px;
      background: rgba(255, 255, 255, .62);
    }

    .status {
      min-height: 24px;
      color: var(--muted);
      font-weight: 700;
      margin-top: 10px;
    }

    .status.error { color: var(--red); }

    @media (max-width: 980px) {
      .systems, .photos { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .saved-item { grid-template-columns: 1fr; }
      .two-fields { grid-template-columns: 1fr; }
      .toolbar { align-items: flex-start; flex-direction: column; }
    }

    @media (max-width: 560px) {
      .systems, .photos { grid-template-columns: 1fr; }
      .button-row .btn { flex: 1 1 180px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">SI</div>
        <div>
          <h1>SISTEMAS</h1>
          <p class="subhead">Creación y archivo de informes técnicos por sistema.</p>
        </div>
      </div>
    </div>

    <section id="homeScreen" class="screen active" aria-labelledby="homeTitle">
      <div class="panel">
        <div class="toolbar">
          <div class="button-row">
            <div id="currentReportNumber" class="report-number">Informe 1</div>
            <button id="saveCurrentBtn" class="btn pink" type="button">Grabar</button>
          </div>
          <div class="button-row">
            <button id="downloadAllPdfBtn" class="btn green" type="button">Descargar todo en PDF</button>
            <button id="downloadAllWordBtn" class="btn blue" type="button">Descargar todo en Word</button>
            <button id="deleteCurrentBtn" class="btn red" type="button">Borrar informe actual</button>
          </div>
        </div>

        <div class="field">
          <label for="reportHeader">Cabecera del informe</label>
          <input id="reportHeader" type="text" placeholder="Ejemplo: BAE 06 - RESIDENCIA INFANTE DON JUAN">
        </div>

        <h2 id="homeTitle">Sistemas</h2>
        <div id="systemButtons" class="systems"></div>
        <div id="homeStatus" class="status" aria-live="polite"></div>
      </div>

      <div class="panel">
        <h2>Informes grabados</h2>
        <div id="savedReports" class="saved-list"></div>
      </div>
    </section>

    <section id="systemScreen" class="screen" aria-labelledby="systemTitle">
      <div class="panel">
        <div class="toolbar">
          <div>
            <h2 id="systemTitle"></h2>
            <p id="systemSubtitle" class="subhead"></p>
          </div>
          <button id="backFromSystemBtn" class="btn" type="button">Volver</button>
        </div>

        <div id="sectionContainer"></div>

        <h2>Imágenes</h2>
        <div id="photoContainer" class="photos"></div>

        <div class="button-row" style="margin-top: 18px;">
          <button id="mountBtn" class="btn lime" type="button">Montar</button>
        </div>
        <div id="systemStatus" class="status" aria-live="polite"></div>
      </div>
    </section>

    <section id="previewScreen" class="screen" aria-labelledby="previewTitle">
      <div class="panel">
        <div class="toolbar">
          <div>
            <h2 id="previewTitle">Vista previa</h2>
            <p id="previewSubtitle" class="subhead"></p>
          </div>
          <div class="button-row">
            <button id="backFromPreviewBtn" class="btn" type="button">Volver</button>
            <button id="saveMountedBtn" class="btn pink" type="button">Grabar</button>
            <button id="downloadMountedPdfBtn" class="btn green" type="button">Descargar informe en PDF</button>
            <button id="downloadMountedWordBtn" class="btn blue" type="button">Descargar en Word</button>
            <button id="clearMountedBtn" class="btn red" type="button">Borrar y empezar de nuevo</button>
          </div>
        </div>
        <div class="preview-shell">
          <article id="mountedPreview" class="doc"></article>
        </div>
        <div id="previewStatus" class="status" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <script>
    const SYSTEMS = [
      "Central de Detección de Incendios",
      "Central de Extinción de Incendios",
      "Extinción de Incendios",
      "Grupo de Presión Contra Incendios",
      "Redes Contra Incendios"
    ];

    const SECTIONS = [
      "1. Antecedentes",
      "2. Comprobaciones realizadas",
      "3. Estado",
      "4. Normativa relacionada",
      "5. Conclusión"
    ];

    const STORAGE_KEY = "sistemas.informes.v2";

    const emptySection = () => ({ fixed: "", voice: "" });

    const defaultState = () => ({
      nextNumber: 1,
      current: {
        number: 1,
        header: "",
        systems: {}
      },
      fixedTexts: {},
      savedReports: []
    });

    let appState = loadState();
    let activeSystem = "";
    let activeRecognition = null;

    const els = {
      homeScreen: document.getElementById("homeScreen"),
      systemScreen: document.getElementById("systemScreen"),
      previewScreen: document.getElementById("previewScreen"),
      currentReportNumber: document.getElementById("currentReportNumber"),
      reportHeader: document.getElementById("reportHeader"),
      systemButtons: document.getElementById("systemButtons"),
      savedReports: document.getElementById("savedReports"),
      homeStatus: document.getElementById("homeStatus"),
      systemTitle: document.getElementById("systemTitle"),
      systemSubtitle: document.getElementById("systemSubtitle"),
      sectionContainer: document.getElementById("sectionContainer"),
      photoContainer: document.getElementById("photoContainer"),
      systemStatus: document.getElementById("systemStatus"),
      mountedPreview: document.getElementById("mountedPreview"),
      previewSubtitle: document.getElementById("previewSubtitle"),
      previewStatus: document.getElementById("previewStatus")
    };

    function loadState() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        const state = parsed && parsed.current ? parsed : defaultState();
        state.nextNumber = Number(state.nextNumber || state.current?.number || 1);
        state.current = state.current || { number: state.nextNumber, header: "", systems: {} };
        state.current.number = Number(state.current.number || state.nextNumber || 1);
        state.current.header = state.current.header || "";
        state.current.systems = state.current.systems || {};
        state.fixedTexts = state.fixedTexts || {};
        state.savedReports = Array.isArray(state.savedReports) ? state.savedReports : [];
        return state;
      } catch (error) {
        return defaultState();
      }
    }

    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
      } catch (error) {
        setStatus(els.homeStatus, "No se pudo guardar. Puede que el navegador tenga el almacenamiento lleno.", true);
      }
    }

    function setStatus(el, message, isError = false) {
      el.textContent = message;
      el.classList.toggle("error", isError);
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function showScreen(name) {
      [els.homeScreen, els.systemScreen, els.previewScreen].forEach(screen => screen.classList.remove("active"));
      document.getElementById(name).classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function ensureSystem(system) {
      if (!appState.current.systems[system]) {
        appState.current.systems[system] = {
          sections: {},
          photos: [],
          mountedHtml: "",
          mountedText: ""
        };
      }

      const target = appState.current.systems[system];
      SECTIONS.forEach(section => {
        if (!target.sections[section]) target.sections[section] = emptySection();
        if (!appState.fixedTexts[system]) appState.fixedTexts[system] = {};
        if (!appState.fixedTexts[system][section]) appState.fixedTexts[system][section] = "";
        if (!target.sections[section].fixed) {
          target.sections[section].fixed = appState.fixedTexts[system][section];
        }
      });

      while (target.photos.length < 10) target.photos.push(null);
      target.photos = target.photos.slice(0, 10);
      return target;
    }

    function renderHome() {
      appState.current.number = appState.current.number || appState.nextNumber || 1;
      els.currentReportNumber.textContent = `Informe ${appState.current.number}`;
      els.reportHeader.value = appState.current.header || "";

      els.systemButtons.innerHTML = SYSTEMS.map(system => `
        <button class="btn lime" type="button" data-system="${escapeHtml(system)}">${escapeHtml(system)}</button>
      `).join("");

      els.savedReports.innerHTML = appState.savedReports.length
        ? appState.savedReports.map(report => `
          <div class="saved-item">
            <div class="saved-title">Informe ${report.number}</div>
            <div class="saved-meta">${escapeHtml((report.header || "").toUpperCase())}<br>${report.systems.length} sistema(s) grabado(s)</div>
            <div class="button-row">
              <button class="btn green" type="button" data-action="pdf" data-id="${report.id}">PDF</button>
              <button class="btn blue" type="button" data-action="word" data-id="${report.id}">Word</button>
              <button class="btn red" type="button" data-action="delete" data-id="${report.id}">Borrar</button>
            </div>
          </div>
        `).join("")
        : '<div class="empty">Todavía no hay informes grabados.</div>';
    }

    function renderSystem(system) {
      activeSystem = system;
      const data = ensureSystem(system);
      els.systemTitle.textContent = system;
      els.systemSubtitle.textContent = `Informe ${appState.current.number}`;
      els.sectionContainer.innerHTML = SECTIONS.map(section => {
        const value = data.sections[section];
        return `
          <div class="section-block">
            <div class="section-head">
              <div class="section-title">${escapeHtml(section)}</div>
              <button class="btn blue" type="button" data-dictate="${escapeHtml(section)}">Redacción por voz</button>
            </div>
            <div class="two-fields">
              <div>
                <label>Texto fijo</label>
                <textarea data-fixed="${escapeHtml(section)}" placeholder="Texto fijo para este apartado y sistema">${escapeHtml(value.fixed)}</textarea>
              </div>
              <div>
                <label>Texto redactado por voz</label>
                <textarea data-voice="${escapeHtml(section)}" placeholder="Aquí aparecerá o se escribirá el texto dictado">${escapeHtml(value.voice)}</textarea>
              </div>
            </div>
          </div>
        `;
      }).join("");

      els.photoContainer.innerHTML = data.photos.map((photo, index) => `
        <div class="photo-slot">
          <div class="photo-preview">${photo ? `<img src="${photo}" alt="Imagen ${index + 1}">` : `Imagen ${index + 1}`}</div>
          <input type="file" accept="image/*" capture="environment" data-photo="${index}">
          <button class="btn red" type="button" data-delete-photo="${index}">Eliminar foto</button>
        </div>
      `).join("");

      setStatus(els.systemStatus, "");
      showScreen("systemScreen");
      saveState();
    }

    function saveSystemInputs() {
      if (!activeSystem) return;
      const data = ensureSystem(activeSystem);
      document.querySelectorAll("[data-fixed]").forEach(textarea => {
        const section = textarea.dataset.fixed;
        data.sections[section].fixed = textarea.value;
        appState.fixedTexts[activeSystem][section] = textarea.value;
      });
      document.querySelectorAll("[data-voice]").forEach(textarea => {
        const section = textarea.dataset.voice;
        data.sections[section].voice = textarea.value;
      });
      saveState();
    }

    function startDictation(section) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const target = document.querySelector(`[data-voice="${CSS.escape(section)}"]`);

      if (!SpeechRecognition || !target) {
        setStatus(els.systemStatus, "El dictado por voz no está disponible en este navegador.", true);
        return;
      }

      if (activeRecognition) activeRecognition.stop();
      const recognition = new SpeechRecognition();
      recognition.lang = "es-ES";
      recognition.continuous = false;
      recognition.interimResults = false;
      activeRecognition = recognition;

      recognition.onstart = () => setStatus(els.systemStatus, `Escuchando: ${section}`);
      recognition.onerror = () => setStatus(els.systemStatus, "No se pudo completar el dictado.", true);
      recognition.onresult = event => {
        const transcript = Array.from(event.results)
          .map(result => result[0].transcript)
          .join(" ")
          .trim();
        target.value = [target.value.trim(), transcript].filter(Boolean).join("\n");
        saveSystemInputs();
        setStatus(els.systemStatus, "Texto dictado añadido.");
      };
      recognition.onend = () => { activeRecognition = null; };
      recognition.start();
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
      });
    }

    function buildSystemReport(system) {
      saveSystemInputs();
      const data = ensureSystem(system);
      const header = (appState.current.header || "INFORME").toUpperCase();
      const sectionHtml = SECTIONS.map(section => {
        const fixed = data.sections[section].fixed.trim();
        const voice = data.sections[section].voice.trim();
        const paragraph = composeParagraph(section, fixed, voice);
        return `<h3>${escapeHtml(section)}</h3><p>${escapeHtml(paragraph)}</p>`;
      }).join("");

      const photos = data.photos.filter(Boolean);
      const photoHtml = photos.length
        ? `<div class="photo-title">ANEXO FOTOGRÁFICO</div><div class="photo-grid">${photos.map(src => `<img src="${src}" alt="">`).join("")}</div>`
        : `<div class="photo-title">ANEXO FOTOGRÁFICO</div>`;

      const html = `
        <section class="doc-part">
          <div class="doc-main-title">${escapeHtml(header)}</div>
          <div class="doc-system-title">${escapeHtml(system)}</div>
          ${sectionHtml}
          ${photoHtml}
        </section>
      `;

      const text = [
        header,
        system,
        ...SECTIONS.flatMap(section => [
          section,
          composeParagraph(section, data.sections[section].fixed.trim(), data.sections[section].voice.trim())
        ]),
        "ANEXO FOTOGRÁFICO"
      ].join("\n\n");

      data.mountedHtml = html;
      data.mountedText = text;
      saveState();
      return { html, text };
    }

    function composeParagraph(section, fixed, voice) {
      const content = [fixed, voice].filter(Boolean).join(" ");
      if (!content) return "No se han indicado datos para este apartado.";

      if (section.includes("Antecedentes")) {
        return `Se toma como antecedente la información aportada para el sistema, dejando constancia de las condiciones observadas y de los datos relevantes para valorar la instalación. ${content}`;
      }
      if (section.includes("Comprobaciones")) {
        return `Se realizan comprobaciones visuales y funcionales sobre los elementos descritos, atendiendo a su estado, accesibilidad, señalización, alimentación, supervisión y respuesta prevista. ${content}`;
      }
      if (section.includes("Estado")) {
        return `El estado del sistema se valora conforme a las observaciones registradas, diferenciando los elementos operativos de aquellos que requieren revisión, reparación o sustitución. ${content}`;
      }
      if (section.includes("Normativa")) {
        return `La valoración se relaciona con la normativa de protección contra incendios aplicable, el RIPCI y las normas UNE que correspondan al sistema inspeccionado. ${content}`;
      }
      return `Como conclusión técnica, se recoge la actuación o seguimiento necesario para dejar el sistema en condiciones adecuadas de servicio y mantenimiento. ${content}`;
    }

    function saveCurrentReport() {
      saveSystemInputs();
      const systems = collectCurrentSystems();

      if (!systems.length && !appState.current.header.trim()) {
        setStatus(els.homeStatus, "No hay datos para grabar.", true);
        return;
      }

      const existingIndex = appState.savedReports.findIndex(report => report.number === appState.current.number);
      const report = {
        id: existingIndex >= 0 ? appState.savedReports[existingIndex].id : makeId(),
        number: appState.current.number,
        header: appState.current.header,
        systems,
        createdAt: new Date().toISOString()
      };

      if (existingIndex >= 0) appState.savedReports[existingIndex] = report;
      else appState.savedReports.push(report);

      appState.nextNumber = Math.max(appState.nextNumber || 1, appState.current.number + 1);
      appState.current = {
        number: appState.nextNumber,
        header: "",
        systems: {}
      };
      appState.nextNumber += 1;
      saveState();
      renderHome();
      setStatus(els.homeStatus, `Informe ${report.number} grabado.`);
      showScreen("homeScreen");
    }

    function collectCurrentSystems() {
      return SYSTEMS
        .filter(system => appState.current.systems[system])
        .map(system => ({ name: system, data: ensureSystem(system) }))
        .filter(item => item.data.mountedHtml || hasSystemContent(item.data))
        .map(item => {
          if (!item.data.mountedHtml) buildSystemReport(item.name);
          return {
            name: item.name,
            html: appState.current.systems[item.name].mountedHtml,
            text: appState.current.systems[item.name].mountedText,
            photos: appState.current.systems[item.name].photos.filter(Boolean)
          };
        });
    }

    function makeCurrentReportSnapshot() {
      saveSystemInputs();
      return {
        id: "current",
        number: appState.current.number,
        header: appState.current.header,
        systems: collectCurrentSystems(),
        createdAt: new Date().toISOString()
      };
    }

    function makeAllReportsSnapshot() {
      const current = makeCurrentReportSnapshot();
      const reports = [...appState.savedReports];
      if (current.systems.length || current.header.trim()) reports.push(current);
      return {
        id: "all",
        number: "todo",
        header: "TODOS LOS INFORMES",
        systems: reports.flatMap(report => report.systems),
        createdAt: new Date().toISOString()
      };
    }

    function hasSystemContent(data) {
      return SECTIONS.some(section => {
        const item = data.sections[section] || emptySection();
        return item.fixed.trim() || item.voice.trim();
      }) || data.photos.some(Boolean);
    }

    function makeId() {
      if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
      return `report-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function clearCurrentReport() {
      appState.current = {
        number: appState.current.number || appState.nextNumber || 1,
        header: "",
        systems: {}
      };
      saveState();
      renderHome();
      setStatus(els.homeStatus, "Informe actual borrado.");
      showScreen("homeScreen");
    }

    function buildFullHtml(report) {
      return `<div class="doc">${report.systems.map(system => system.html).join('<div style="page-break-after: always;"></div>')}</div>`;
    }

    function buildFullText(report) {
      return report.systems.map(system => system.text).join("\n\n------------------------------\n\n");
    }

    function downloadWord(html, filename) {
      const documentHtml = `
        <!doctype html>
        <html>
        <head>
          <meta charset="utf-8">
          <style>
            body { font-family: Arial, sans-serif; font-size: 11pt; color: #111; }
            .doc-main-title { text-align: center; text-transform: uppercase; font-size: 14pt; font-weight: 700; margin-bottom: 18px; }
            .doc-system-title { text-align: center; font-size: 13pt; font-weight: 700; margin-bottom: 16px; }
            h3 { font-size: 11.5pt; margin: 14px 0 6px; }
            p { margin: 0 0 8px; }
            .photo-title { text-align: center; text-transform: uppercase; font-size: 14pt; font-weight: 700; margin: 22px 0 14px; }
            .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
            .photo-grid img { width: 48%; margin: 1%; vertical-align: top; }
          </style>
        </head>
        <body>${html}</body>
        </html>
      `;
      downloadBlob(new TextEncoder().encode(documentHtml), "application/msword", filename);
    }

    function downloadPdfFromText(text, filename) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: "pt", format: "a4" });
      const margin = 42;
      const maxWidth = 511;
      const lines = doc.splitTextToSize(text, maxWidth);
      let y = margin;
      doc.setFont("helvetica", "normal");
      doc.setFontSize(10.5);
      lines.forEach(line => {
        if (y > 800) {
          doc.addPage();
          y = margin;
        }
        doc.text(line, margin, y);
        y += 14;
      });
      doc.save(filename);
    }

    function downloadBlob(bytes, type, filename) {
      const blob = new Blob([bytes], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function getReport(id) {
      return appState.savedReports.find(report => report.id === id);
    }

    document.getElementById("saveCurrentBtn").addEventListener("click", saveCurrentReport);
    document.getElementById("deleteCurrentBtn").addEventListener("click", clearCurrentReport);
    document.getElementById("backFromSystemBtn").addEventListener("click", () => {
      saveSystemInputs();
      renderHome();
      showScreen("homeScreen");
    });
    document.getElementById("backFromPreviewBtn").addEventListener("click", () => renderSystem(activeSystem));
    document.getElementById("mountBtn").addEventListener("click", () => {
      const report = buildSystemReport(activeSystem);
      els.mountedPreview.innerHTML = report.html;
      els.previewSubtitle.textContent = activeSystem;
      setStatus(els.previewStatus, "");
      showScreen("previewScreen");
    });
    document.getElementById("saveMountedBtn").addEventListener("click", saveCurrentReport);
    document.getElementById("downloadMountedWordBtn").addEventListener("click", () => {
      const report = buildSystemReport(activeSystem);
      downloadWord(report.html, `informe-${appState.current.number}-${activeSystem}.doc`);
    });
    document.getElementById("downloadMountedPdfBtn").addEventListener("click", () => {
      const report = buildSystemReport(activeSystem);
      downloadPdfFromText(report.text, `informe-${appState.current.number}-${activeSystem}.pdf`);
    });
    document.getElementById("clearMountedBtn").addEventListener("click", clearCurrentReport);
    document.getElementById("downloadAllPdfBtn").addEventListener("click", () => {
      const report = makeAllReportsSnapshot();
      if (!report.systems.length) {
        setStatus(els.homeStatus, "No hay informes para descargar.", true);
        return;
      }
      downloadPdfFromText(buildFullText(report), "informes-sistemas.pdf");
    });
    document.getElementById("downloadAllWordBtn").addEventListener("click", () => {
      const report = makeAllReportsSnapshot();
      if (!report.systems.length) {
        setStatus(els.homeStatus, "No hay informes para descargar.", true);
        return;
      }
      downloadWord(buildFullHtml(report), "informes-sistemas.doc");
    });

    els.reportHeader.addEventListener("input", () => {
      appState.current.header = els.reportHeader.value;
      saveState();
    });

    els.systemButtons.addEventListener("click", event => {
      const button = event.target.closest("[data-system]");
      if (button) renderSystem(button.dataset.system);
    });

    els.savedReports.addEventListener("click", event => {
      const button = event.target.closest("[data-action]");
      if (!button) return;
      const report = getReport(button.dataset.id);
      if (!report) return;

      if (button.dataset.action === "delete") {
        appState.savedReports = appState.savedReports.filter(item => item.id !== report.id);
        saveState();
        renderHome();
        setStatus(els.homeStatus, `Informe ${report.number} borrado.`);
      }
      if (button.dataset.action === "word") {
        downloadWord(buildFullHtml(report), `informe-${report.number}.doc`);
      }
      if (button.dataset.action === "pdf") {
        downloadPdfFromText(buildFullText(report), `informe-${report.number}.pdf`);
      }
    });

    els.sectionContainer.addEventListener("input", saveSystemInputs);
    els.sectionContainer.addEventListener("click", event => {
      const button = event.target.closest("[data-dictate]");
      if (button) startDictation(button.dataset.dictate);
    });

    els.photoContainer.addEventListener("change", async event => {
      const input = event.target.closest("[data-photo]");
      if (!input || !input.files[0]) return;
      const data = ensureSystem(activeSystem);
      const index = Number(input.dataset.photo);
      try {
        data.photos[index] = await fileToDataUrl(input.files[0]);
        saveState();
        renderSystem(activeSystem);
      } catch (error) {
        setStatus(els.systemStatus, "No se pudo cargar la imagen.", true);
      }
    });

    els.photoContainer.addEventListener("click", event => {
      const button = event.target.closest("[data-delete-photo]");
      if (!button) return;
      const data = ensureSystem(activeSystem);
      data.photos[Number(button.dataset.deletePhoto)] = null;
      saveState();
      renderSystem(activeSystem);
    });

    renderHome();
  </script>
</body>
</html>
